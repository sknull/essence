name: Essence KMP CI

on:
  push:
    branches: [ "main" ]
#    paths:
#      - 'library/**'
#      - 'gradle/**'
#      - '*.kts'

  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          cache-encryption-key: ${{ secrets.Gradle_Encryption_Key }}

      - name: Run Tests
        run: |
          chmod +x gradlew
          ./gradlew :library:test :library:desktopTest

      - name: Build Library
        run: |
          chmod +x gradlew
          ./gradlew :library:assemble

      - name: Publish to GitHub Packages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x gradlew
          ./gradlew clean :library:publishAllPublicationsToGitHubPackagesRepository --no-configuration-cache
